<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聚会神器 v2</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{

font-family:
-apple-system,
BlinkMacSystemFont,
"Segoe UI",
sans-serif;

color:white;

min-height:100vh;

overflow-x:hidden;

background:
radial-gradient(circle at 20% 20%, #ff00cc55, transparent 300px),
radial-gradient(circle at 80% 80%, #00ccff55, transparent 300px),
linear-gradient(135deg,#020617,#0f172a);

background-size:200% 200%;

animation:bgMove 10s infinite alternate;

}

@keyframes bgMove{

0%{
background-position:0% 50%;
}

100%{
background-position:100% 50%;
}

}

.container{
padding:20px;
}

.title{

font-size:42px;
font-weight:900;

margin-top:20px;
margin-bottom:30px;

text-align:center;

background:linear-gradient(90deg,#00e5ff,#ff00cc);
background-clip: text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:18px;

}

.card{

height:130px;

border-radius:28px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

display:flex;

justify-content:center;
align-items:center;

font-size:24px;
font-weight:900;

box-shadow:
0 10px 30px rgba(0,0,0,.25);

transition:.25s;

}

.card:active{
transform:scale(.96);
}

.page{

display:none;

position:fixed;

inset:0;

z-index:999;

padding:20px;

overflow:auto;

background:
radial-gradient(circle at 20% 20%, #ff00cc55, transparent 300px),
radial-gradient(circle at 80% 80%, #00ccff55, transparent 300px),
linear-gradient(135deg,#020617,#0f172a);

background-size:200% 200%;

animation:bgMove 10s infinite alternate;

}

.back{

width:60px;
height:60px;

border:none;
border-radius:50%;

background:#ef4444;

color:white;

font-size:30px;
font-weight:900;

}

.page h2{

margin-top:20px;
margin-bottom:20px;

font-size:36px;

}

.big-btn{

width:100%;
height:70px;

border:none;
border-radius:999px;

font-size:28px;
font-weight:900;

color:white;

background:linear-gradient(90deg,#00e5ff,#8b5cf6);

margin-top:20px;

}

/* 指尖 */

.finger-area{

position:fixed;
inset:0;

touch-action:none;

}

.start-btn{

position:fixed;

left:50%;
top:50%;

transform:translate(-50%,-50%);

width:240px;
height:90px;

border:none;
border-radius:999px;

background:#22c55e;

color:white;

font-size:40px;
font-weight:900;

z-index:99999;

box-shadow:
0 0 40px rgba(34,197,94,.45);

}

.finger-dot{

position:absolute;

width:90px;
height:90px;

border-radius:50%;

display:flex;
justify-content:center;
align-items:center;

font-size:30px;
font-weight:900;

color:white;

border:4px solid white;

transform:translate(-50%,-50%);

}

.winner{

animation:pulse .35s infinite alternate;

}

@keyframes pulse{

from{
transform:translate(-50%,-50%) scale(1);
}

to{
transform:translate(-50%,-50%) scale(1.3);
}

}

/* 卧底 */

.select{

width:100%;
height:60px;

border:none;
border-radius:18px;

padding:0 20px;

font-size:20px;

margin-bottom:20px;

}

.card-box{

margin-top:20px;

display:grid;
gap:16px;

}

.result-card{

padding:20px;

border-radius:20px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(20px);

font-size:24px;

text-align:center;

}

/* 转盘 */

.wheel-wrap{

display:flex;
justify-content:center;
align-items:center;

margin-top:30px;

}

.wheel{

width:320px;
height:320px;

border-radius:50%;

border:10px solid white;

position:relative;

transition:5s cubic-bezier(.15,.85,.2,1);

background:
conic-gradient(
#ff4d8d 0deg 60deg,
#00e5ff 60deg 120deg,
#22c55e 120deg 180deg,
#f59e0b 180deg 240deg,
#8b5cf6 240deg 300deg,
#ef4444 300deg 360deg
);

}

.pointer{

position:absolute;

top:-20px;
left:50%;

transform:translateX(-50%);

width:0;
height:0;

border-left:20px solid transparent;
border-right:20px solid transparent;
border-bottom:40px solid white;

}

.truth-box{

margin-top:30px;

padding:24px;

border-radius:24px;

background:rgba(255,255,255,.08);

font-size:28px;

line-height:1.6;

text-align:center;

backdrop-filter:blur(20px);

}

</style>
</head>

<!-- 真心话 -->

<div class="page"

<button class="back"

×
</button>

<h2>真心话</h2>

<button class="big-btn"

<div class="truth-box"

</div>

<div class="page"

<button class="back"

document.getElementById(id)
.style.display="block";

}

function closePage(id){

document.getElementById(id)
.style.display="none";

}

document.getElementById(
"fingerArea"
);

const startBtn =
document.getElementById(
"startBtn"
);

const colors=[
"#00e5ff",
"#ff4d8d",
"#22c55e",
"#8b5cf6",
"#f59e0b"
];

const touches=new Map();

let winner=null;

function renderTouches(){

fingerArea
.querySelectorAll(".finger-dot")
.forEach(el=>el.remove());

Array.from(
touches.values()
).forEach((touch,index)=>{

const dot=
document.createElement("div");

dot.className="finger-dot";

if(winner===touch.id){

dot.classList.add("winner");

}

dot.style.left=
touch.x+"px";

dot.style.top=
touch.y+"px";

dot.style.background=
colors[index%colors.length];

dot.innerText=index+1;

fingerArea.appendChild(dot);

});

}

function updateTouches(e){

Array.from(e.touches)
.forEach(t=>{

touches.set(
t.identifier,
{
id:t.identifier,
x:t.clientX,
y:t.clientY
}
);

});

renderTouches();

}

fingerArea.addEventListener(
"touchstart",
updateTouches
);

fingerArea.addEventListener(
"touchmove",
updateTouches
);

fingerArea.addEventListener(
"touchend",
e=>{

touches.clear();

Array.from(e.touches)
.forEach(t=>{

touches.set(
t.identifier,
{
id:t.identifier,
x:t.clientX,
y:t.clientY
}
);

});

renderTouches();

}
);

startBtn.addEventListener(
"touchstart",
()=>{

if(touches.size===0)return;

startBtn.style.background=
"#ef4444";

const ids=
Array.from(
touches.keys()
);

let count=0;

const timer=
setInterval(()=>{

winner=
ids[
Math.floor(
Math.random()*ids.length
)
];

renderTouches();

count++;

if(count>=30){

clearInterval(timer);

startBtn.style.background=
"#22c55e";

}

},100);

}
);

function startUndercover(){

const box=
document.getElementById(
"undercoverResult"
);

box.innerHTML="";

const count=
Number(
document.getElementById(
"playerCount"
).value
);

const pair=
words[
Math.floor(
Math.random()*words.length
)
];

const undercoverCount=
count>=8?2:1;

const players=[];

for(let i=1;i<=count;i++){

players.push(i);

}

players.sort(()=>Math.random()-0.5);

for(let i=1;i<=count;i++){

const div=
document.createElement("div");

div.className="result-card";

const isUndercover=
players
.slice(0,undercoverCount)
.includes(i);

div.innerHTML=
`
玩家 ${i}
<br><br>
${isUndercover?pair[1]:pair[0]}
`;

box.appendChild(div);

}

}

);

`rotate(${rotateDeg}deg)`;

Math.random()*punishments.length
);

document.getElementById(
"wheelResult"
).innerText=

},5000);
