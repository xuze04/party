<!-- index.html -->
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>聚会神器</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<main class="app-shell">

  <header class="topbar">
    <div>
      <p class="eyebrow">Party Sync</p>
      <h1>聚会神器</h1>
    </div>
  </header>

  <nav class="mode-tabs">

    <button class="tab active" data-panel="homePanel">
      首页
    </button>

    <button class="tab" data-panel="undercoverPanel">
      谁是卧底
    </button>

    <button class="tab" data-panel="werewolfPanel">
      狼人杀
    </button>

  </nav>

  <!-- 首页 -->
  <section class="panel active" id="homePanel">

    <div class="home-card">

      <h2>指尖模式</h2>

      <p>
        多人把手指按在同一块屏幕上，
        点击 START 后随机抽取一位。
      </p>

      <button class="primary-btn" id="enterFingerBtn">
        进入指尖模式
      </button>

    </div>

  </section>

  <!-- 全屏指尖模式 -->
  <section class="finger-screen" id="fingerScreen">

    <div class="finger-pad" id="fingerPad">

      <div class="finger-title">
        按住屏幕加入
      </div>

      <button class="start-btn" id="startBtn">
        START
      </button>

    </div>

  </section>

  <!-- 谁是卧底 -->
  <section class="panel" id="undercoverPanel">

    <div class="section-head">
      <h2>谁是卧底</h2>
      <p>输入玩家后随机发牌</p>
    </div>

    <div class="input-row">

      <input
        type="text"
        id="undercoverName"
        placeholder="输入玩家名字"
      >

      <button id="addUndercoverPlayer">
        添加
      </button>

    </div>

    <div class="players" id="undercoverPlayers">
    </div>

    <div class="word-grid">

      <input
        id="civilianWord"
        value="牛奶"
      >

      <input
        id="undercoverWord"
        value="豆浆"
      >

    </div>

    <button class="primary-btn" id="dealUndercover">
      开始发牌
    </button>

    <div class="cards" id="undercoverCards"></div>

  </section>

  <!-- 狼人杀 -->
  <section class="panel" id="werewolfPanel">

    <div class="section-head">
      <h2>狼人杀发牌</h2>
      <p>输入玩家后随机分配身份</p>
    </div>

    <div class="input-row">

      <input
        type="text"
        id="wolfName"
        placeholder="输入玩家名字"
      >

      <button id="addWolfPlayer">
        添加
      </button>

    </div>

    <div class="players" id="wolfPlayers"></div>

    <button class="primary-btn" id="dealWolf">
      开始发牌
    </button>

    <div class="cards" id="wolfCards"></div>

  </section>

</main>

<script src="app.js"></script>

</body>
</html>
